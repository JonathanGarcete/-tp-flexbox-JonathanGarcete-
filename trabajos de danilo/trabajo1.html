<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú horizontal con flex</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    ul {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      background-color: rgba(123, 198, 199, 0.8);
      width: 100%;
    }

    li {
      flex: 1; /* cada item ocupa el mismo ancho */
      text-align: center;
      border-right: 1px solid rgba(0, 0, 0, 0.2); /* línea divisoria */
    }

    li:last-child {
      border-right: none; /* saca la línea del último */
    }

    li a {
      display: block;
      padding: 15px 0;
      text-decoration: none;
      color: black;
    }

    li a:hover {
      background-color: rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Servicios</a></li>
    <li><a href="#">Opciones</a></li>
    <li><a href="#">Planes</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>

</body>
</html>
