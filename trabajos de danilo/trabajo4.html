<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Centrado total de un título</title>
  <style>
    body {
      margin: 20px;
      font-family: sans-serif;
    }

    .cuadro {
      display: flex;
      justify-content: center; /* centra horizontal */
      align-items: center;     /* centra vertical */
      width: 300px;
      height: 300px;
      background-color: rgba(193, 219, 210, 1.0);
    }

    h2 {
      margin: 0;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="cuadro">
    <h2>Capítulo Inicial</h2>
  </div>

</body>
</html>
