<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sidebar con menú</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .contenedor {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      flex: 1; /* 1 parte */
      background-color: rgba(84, 181, 191, 1.0);
      padding: 10px;
    }

    .contenido {
      flex: 8; /* 8 partes (relación 1:8) */
      background-color: rgba(193, 219, 210, 1.0);
      padding: 10px;
      color: black;
    }

    .sidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar li {
      border-bottom: 1px solid gray; /* borde inferior */
      padding: 8px 5px;
    }

    .sidebar li a {
      text-decoration: none;
      color: black;
      display: block;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <div class="sidebar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Opciones</a></li>
        <li><a href="#">Planes</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </div>
    <div class="contenido">
      Esto sería el contenido principal
    </div>
  </div>

</body>
</html>
