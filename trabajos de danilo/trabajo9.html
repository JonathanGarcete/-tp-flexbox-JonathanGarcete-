<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Layout de dos columnas con filas</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background-color: #f0f0f0;
    }

    .contenedor {
      display: flex;
      background-color: white;
      border: 1px solid lightgray;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    .columna-izquierda {
      flex: 2; /* 2 partes */
      background-color: #0e7c74;
      color: white;
      padding: 24px;
      min-height: 250px;
    }

    .columna-derecha {
      flex: 1; /* 1 parte (mitad de la izquierda) */
      display: flex;
      flex-direction: column;
    }

    .fila {
      flex: 1; /* cada fila ocupa la mitad */
      padding: 24px;
      border: 1px solid lightgray;
      background-color: white;
      color: black;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <div class="columna-izquierda">
      Columna izquierda
    </div>
    <div class="columna-derecha">
      <div class="fila">
        Derecha<br>parte alta
      </div>
      <div class="fila">
        Derecha<br>parte baja
      </div>
    </div>
  </div>

</body>
</html>
